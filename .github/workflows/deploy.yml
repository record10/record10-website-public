# Place this file at .github/workflows/deploy.yml in the PUBLIC repo (pritraj/record10-website-public)
#
# REQUIRED SECRETS (Repository Level - pritraj/record10-website-public):
#   - PRIVATE_REPO_PAT: Fine-grained PAT with Contents:Read on Pritraj/record10-website
#
name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from (private repo)"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - dev

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone private repository
        shell: bash
        run: |
          git clone --depth 1 --branch ${{ inputs.branch || 'main' }} \
            https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/Pritraj/record10-website.git .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
